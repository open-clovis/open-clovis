services:
  agent:
    build: https://github.com/thiagob/claude-clovis.git
    container_name: claude-${BOT_NAME:-clovis}
    restart: unless-stopped
    stdin_open: true       # Claude expects a TTY-ish stdin
    tty: true              # without these the process exits immediately
    volumes:
      - ./data/config:/home/claude/.claude  # OAuth + telegram pairing + sessions
      - ./data/claude.json:/home/claude/.claude.json  # wizard state + theme
      - ./data/workspace:/workspace               # what Claude operates on
    environment:
      TZ: America/Sao_Paulo
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}