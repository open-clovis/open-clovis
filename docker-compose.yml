services:
  agent:
    build:
      context: https://github.com/open-clovis/open-clovis.git
    #build: .
    container_name: open-clovis-${BOT_NAME:-clovis}
    restart: unless-stopped
    stdin_open: true       # Claude expects a TTY-ish stdin
    tty: true              # without these the process exits immediately
    volumes:
      - ./data:/home/clovis  # home dir — holds .claude/ config and .claude.json
    environment:
      TZ: America/Sao_Paulo
      HOME: /home/clovis
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      #GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # Google Workspace MCP — leave blank to disable
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}